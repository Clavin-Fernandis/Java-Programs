<!-- 9.c Build a Session Management using JSP program
for getting session expiry time and your name
through text box and press submit.

index.html -->

<!DOCTYPE html>
<html>
<head>
<title>Session Input</title>
</head>

<body>

<form action="welcome.jsp">

Enter Your Name :

<input type="text"
       name="uname"
       required>

<br><br>

Enter Session Expiry Time
(in minutes) :

<input type="number"
       name="time"
       required>

<br><br>

<input type="submit"
       value="Start Session">

</form>

</body>
</html>
